name: Release

# Cut a release by bumping `version` in Cargo.toml, committing, then tagging:
#   git tag v0.2.0 && git push origin v0.2.0
# The tag must match the Cargo.toml version or the build fails fast.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  verify-version:
    name: verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must equal Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$tag  cargo=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

  create-release:
    name: create GitHub Release
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # upload-rust-binary-action uploads to an EXISTING release, so create it
      # once here (idempotent) before the build matrix attaches the binaries.
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Static musl binaries for x86_64 and aarch64 are attached below. See CHANGELOG.md for details."

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Builds a static musl binary (cross-compiling aarch64 via `cross`),
      # packages it as pcurl-<tag>-<target>.tar.gz with a .sha256, and uploads
      # it to the GitHub Release created above.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pcurl
          target: ${{ matrix.target }}
          archive: pcurl-$tag-$target
          include: LICENSE,README.md
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
